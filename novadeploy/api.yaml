openapi: 3.0.3
info:
  title: NovaDeploy API
  description: Deploy, manage, and monitor services on the NovaDeploy platform.
  version: 2.1.0
  contact:
    name: NovaDeploy Developer Support
    url: https://docs.novadeploy.io
    email: api@novadeploy.io

servers:
  - url: https://api.novadeploy.io/v2
    description: Production

tags:
  - name: Services
    description: Manage services
  - name: Deployments
    description: Trigger and track deployments
  - name: Releases
    description: View and roll back releases

paths:
  /services:
    get:
      tags: [Services]
      summary: List services
      description: Returns all services in the authenticated team.
      parameters:
        - name: environment
          in: query
          schema:
            type: string
            enum: [development, staging, production]
          description: Filter by environment
      responses:
        '200':
          description: A list of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'

  /services/{serviceId}/deploy:
    post:
      tags: [Deployments]
      summary: Trigger a deployment
      description: Deploys the specified image to the given environment.
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployRequest'
      responses:
        '202':
          description: Deployment accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Deployment'
        '400':
          description: Invalid request
        '404':
          description: Service not found

  /services/{serviceId}/releases:
    get:
      tags: [Releases]
      summary: List releases
      description: Returns the deployment history for a service.
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: A list of releases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Release'

  /services/{serviceId}/rollback:
    post:
      tags: [Releases]
      summary: Roll back to a previous release
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [releaseId]
              properties:
                releaseId:
                  type: string
                  example: rel_7f3k2a
      responses:
        '202':
          description: Rollback accepted
        '404':
          description: Service or release not found

components:
  schemas:
    Service:
      type: object
      properties:
        id:
          type: string
          example: svc_9xb3k1
        name:
          type: string
          example: payments-api
        environment:
          type: string
          enum: [development, staging, production]
        status:
          type: string
          enum: [running, deploying, failed, stopped]
        lastDeployedAt:
          type: string
          format: date-time

    DeployRequest:
      type: object
      required: [imageTag, environment]
      properties:
        imageTag:
          type: string
          example: sha-abc123
        environment:
          type: string
          enum: [development, staging, production]
        notes:
          type: string
          example: "Fix null pointer in checkout flow"

    Deployment:
      type: object
      properties:
        id:
          type: string
          example: dep_4kq9z2
        serviceId:
          type: string
        status:
          type: string
          enum: [pending, running, succeeded, failed]
        createdAt:
          type: string
          format: date-time

    Release:
      type: object
      properties:
        id:
          type: string
          example: rel_7f3k2a
        imageTag:
          type: string
        deployedBy:
          type: string
          example: sara@novadeploy.io
        deployedAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, superseded, rolled-back]
        notes:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
